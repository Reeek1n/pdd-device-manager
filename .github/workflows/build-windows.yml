name: Build Windows Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install PyQt6 paramiko bcrypt cryptography pynacl
      shell: cmd
        
    - name: Clean and Build application
      run: |
        cd pdd_device_manager
        rmdir /s /q build 2>nul
        rmdir /s /q dist 2>nul
        pyinstaller pdd_device_manager_windows.spec -y --clean
      shell: cmd
        
    - name: Check build output
      run: |
        dir pdd_device_manager\dist
      shell: cmd
        
    - name: Create ZIP package
      if: success()
      run: |
        cd pdd_device_manager\dist
        Compress-Archive -Path "PDD Device Manager" -DestinationPath "PDD-Device-Manager-Windows.zip"
      shell: pwsh
        
    - name: Upload artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: PDD-Device-Manager-Windows
        path: pdd_device_manager/dist/PDD-Device-Manager-Windows.zip
