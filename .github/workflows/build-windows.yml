name: Build Windows Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write  # 允许写入内容（创建 Release）
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install PyQt6 paramiko bcrypt cryptography pynacl
      shell: cmd
        
    - name: Clean and Build application
      run: |
        cd pdd_device_manager
        rmdir /s /q build 2>nul
        rmdir /s /q dist 2>nul
        pyinstaller pdd_device_manager_windows.spec -y --clean
      shell: cmd
        
    - name: Check build output
      run: |
        dir pdd_device_manager\dist
      shell: cmd
        
    - name: Create ZIP package
      run: |
        cd pdd_device_manager\dist
        ren "PDD Device Manager" "PDD-Device-Manager"
        Compress-Archive -Path "PDD-Device-Manager" -DestinationPath "PDD-Device-Manager-Windows.zip"
      shell: pwsh
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PDD-Device-Manager-Windows
        path: pdd_device_manager/dist/PDD-Device-Manager-Windows.zip
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: github.event_name == 'push'
      with:
        tag_name: v1.0.0
        name: Release v1.0.0
        body: |
          PDD Device Manager Windows 版本
          
          使用方法：
          1. 下载 PDD-Device-Manager-Windows.zip
          2. 解压到任意文件夹
          3. 运行 PDD-Device-Manager/PDD Device Manager.exe
        files: pdd_device_manager/dist/PDD-Device-Manager-Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
